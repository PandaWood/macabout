name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Verify tag matches package version
        run: |
          PKG_VERSION=$(python3 -c "from macabout import __version__; print(__version__)")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Error: tag $GITHUB_REF_NAME does not match __version__ $PKG_VERSION"
            echo "Update macabout/__init__.py before tagging."
            exit 1
          fi
          echo "Version: $PKG_VERSION"

      - name: Install dpkg tools
        run: sudo apt-get install -y dpkg

      - name: Build .deb
        run: ./build.sh

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/macabout_*_all.deb
            install.sh
          generate_release_notes: true
          body: |
            ## Quick Install (One-Line)

            ```bash
            curl -sSL https://pandawood.github.io/macabout/install.sh | sudo bash
            ```

            ## Manual Install

            ```bash
            sudo apt install ./macabout_*.deb
            ```

            **Requires:** `python3-tk`, `pciutils`, `dmidecode`
            **Recommends:** `python3-pil` (icon resizing)

      - name: Prepare GitHub Pages
        run: |
          cp install.sh docs/install.sh
          cp -r img docs/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: false
